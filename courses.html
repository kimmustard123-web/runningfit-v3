<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>러닝코스 추천 | RunningFit V3.2</title>
  <meta name="description" content="지역별 러닝코스, 거리, 난이도, 노면, 시작 지점을 확인하는 RunningFit 코스 페이지입니다." />
  <link rel="stylesheet" href="./css/app.css" />
  <link rel="stylesheet" href="./css/pages.css" />
</head>
<body>
  <header class="site-header rf-header">
    <div class="header-inner rf-header-row">
      <a href="./index.html" class="brand" aria-label="RunningFit 홈">
        <span class="brand-mark">RF</span>
        <span class="brand-text">
          <strong>RunningFit</strong>
          <small id="currentPageLabel">코스</small>
        </span>
      </a>

      <button class="nav-toggle" type="button" aria-label="메뉴 열기" data-nav-toggle>☰</button>

      <nav class="top-nav" data-nav aria-label="주요 메뉴">
          <a href="./index.html" class="nav-link">홈</a>
          <a href="./shoes.html" class="nav-link">러닝화</a>
          <a href="./pace.html" class="nav-link">페이스 계산기</a>
          <a href="./weather.html" class="nav-link">날씨</a>
          <a href="./races.html" class="nav-link">대회</a>
          <a href="./courses.html" class="nav-link active">코스</a>
          <a href="./profile.html" class="nav-link">프로필</a>
        <button id="themeToggle" class="theme-toggle" type="button" aria-label="다크모드 전환">🌙</button>
      </nav>
    </div>

    <div class="global-search-wrap">
      <form id="globalSearchForm" class="global-search" action="./shoes.html">
        <label for="globalSearchInput" class="sr-only">러닝화 검색</label>
        <input
          id="globalSearchInput"
          name="q"
          type="search"
          autocomplete="off"
          placeholder="러닝화 검색 · 모델명, 브랜드, 한글·영문·초성 검색"
        />
        <button type="submit">검색</button>
      </form>
      <div id="globalSearchSuggestions" class="search-suggestions" aria-label="검색 추천 목록"></div>
    </div>
  </header>

  <main>
    <section class="page-hero">
      <p class="eyebrow">Running courses</p>
      <h1>러닝코스 추천</h1>
      <p>지도/GPS 연동 전까지는 검증 가능한 코스만 등록하는 구조로 유지합니다.</p>
    </section>
    <section class="tool-row">
      <input data-course-search type="search" placeholder="지역, 코스명 검색" />
      <select data-course-level>
        <option value="">전체 난이도</option>
        <option value="easy">쉬움</option>
        <option value="normal">보통</option>
        <option value="hard">어려움</option>
      </select>
    </section>
    <section class="course-grid" data-course-grid></section>
  </main>
  <footer class="site-footer"><p>지도 이미지는 무단 캡처하지 않고, 정식 지도 API 또는 직접 제작 자료만 사용합니다.</p></footer>
  <script src="./js/app.js" defer></script>
  <script src="./js/pages.js" defer></script>
</body>
</html>
