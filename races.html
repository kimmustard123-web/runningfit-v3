<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대회 정보 - RunningFit</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="races">
  <header class="site-header">
    <a href="index.html" class="logo">RunningFit</a>
    <nav>
      <a href="index.html">홈</a>
      <a href="shoes.html">러닝화 추천</a>
      <a href="weather.html">날씨</a>
      <a href="races.html" class="active">대회 정보</a>
      <a href="courses.html">러닝 코스</a>
    </nav>
  </header>

  <main class="container">
    <section class="page-hero">
      <h1>2026 러닝대회 정보</h1>
      <p>지역, 날짜, 신청 상태, 신청 링크를 확인합니다.</p>
    </section>

    <section class="filters">
      <input id="raceSearch" type="text" placeholder="지역 / 대회명 검색" />
      <select id="raceStatusFilter">
        <option value="">전체 상태</option>
        <option value="open">신청 가능</option>
        <option value="soon">신청 예정</option>
        <option value="closed">마감</option>
      </select>
    </section>

    <div id="raceList" class="list-grid"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
