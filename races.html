<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>러닝대회 정보 | RunningFit V3.2</title>
  <meta name="description" content="공식 주최 페이지로 검증된 러닝대회 정보를 모아보는 RunningFit 대회 페이지입니다." />
  <link rel="stylesheet" href="./css/app.css" />
  <link rel="stylesheet" href="./css/pages.css" />
</head>
<body>
  <header class="site-header rf-header">
    <div class="header-inner rf-header-row">
      <a href="./index.html" class="brand" aria-label="RunningFit 홈">
        <span class="brand-mark">RF</span>
        <span class="brand-text">
          <strong>RunningFit</strong>
          <small id="currentPageLabel">대회</small>
        </span>
      </a>

      <button class="nav-toggle" type="button" aria-label="메뉴 열기" data-nav-toggle>☰</button>

      <nav class="top-nav" data-nav aria-label="주요 메뉴">
          <a href="./index.html" class="nav-link">홈</a>
          <a href="./shoes.html" class="nav-link">러닝화</a>
          <a href="./pace.html" class="nav-link">페이스 계산기</a>
          <a href="./weather.html" class="nav-link">날씨</a>
          <a href="./races.html" class="nav-link active">대회</a>
          <a href="./courses.html" class="nav-link">코스</a>
          <a href="./profile.html" class="nav-link">프로필</a>
        <button id="themeToggle" class="theme-toggle" type="button" aria-label="다크모드 전환">🌙</button>
      </nav>
    </div>

    <div class="global-search-wrap">
      <form id="globalSearchForm" class="global-search" action="./shoes.html">
        <label for="globalSearchInput" class="sr-only">러닝화 검색</label>
        <input
          id="globalSearchInput"
          name="q"
          type="search"
          autocomplete="off"
          placeholder="러닝화 검색 · 모델명, 브랜드, 한글·영문·초성 검색"
        />
        <button type="submit">검색</button>
      </form>
      <div id="globalSearchSuggestions" class="search-suggestions" aria-label="검색 추천 목록"></div>
    </div>
  </header>

  <main>
    <section class="page-hero">
      <p class="eyebrow">Race calendar</p>
      <h1>러닝대회 정보</h1>
      <p>대회명, 날짜, 접수 상태, 신청 링크는 반드시 공식 주최/접수 페이지 확인 후 등록합니다.</p>
    </section>
    <section class="tool-row">
      <input data-race-search type="search" placeholder="지역, 대회명 검색" />
      <select data-race-status>
        <option value="">전체 상태</option>
        <option value="open">접수 가능</option>
        <option value="closed">접수 마감</option>
        <option value="pending">접수 전</option>
        <option value="verify">확인 필요</option>
      </select>
    </section>
    <section class="race-list" data-race-list></section>
  </main>
  <footer class="site-footer"><p>공식 링크가 없는 대회는 접수 가능으로 표시하지 않습니다.</p></footer>
  <script src="./js/app.js" defer></script>
  <script src="./js/pages.js" defer></script>
</body>
</html>
