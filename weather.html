<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>러닝 날씨 - RunningFit</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="weather">
  <header class="site-header">
    <a href="index.html" class="logo">RunningFit</a>
    <nav>
      <a href="index.html">홈</a>
      <a href="shoes.html">러닝화 추천</a>
      <a href="weather.html" class="active">날씨</a>
      <a href="races.html">대회 정보</a>
      <a href="courses.html">러닝 코스</a>
    </nav>
  </header>

  <main class="container">
    <section class="page-hero">
      <h1>러닝 날씨</h1>
      <p>위치 권한 또는 지역 검색으로 오늘 러닝 적합도를 확인합니다.</p>
    </section>

    <section class="weather-panel">
      <button id="locationBtn">내 위치로 확인</button>
      <input id="cityInput" type="text" placeholder="예: 거제, 부산, 서울" />
      <button id="citySearchBtn">지역 검색</button>
    </section>

    <section id="weatherResult" class="big-card"></section>

    <section>
      <h2>이번 주 러닝 날씨</h2>
      <div id="weeklyWeather" class="card-grid"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
