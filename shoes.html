<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>러닝화 추천 - RunningFit</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="shoes">
  <header class="site-header">
    <a href="index.html" class="logo">RunningFit</a>
    <nav>
      <a href="index.html">홈</a>
      <a href="shoes.html" class="active">러닝화 추천</a>
      <a href="weather.html">날씨</a>
      <a href="races.html">대회 정보</a>
      <a href="courses.html">러닝 코스</a>
    </nav>
  </header>

  <main class="container">
    <section class="page-hero">
      <h1>러닝화 추천</h1>
      <p>현재 신는 신발, 발볼, 통증, 예산 기준으로 추천합니다.</p>
    </section>

    <section class="filters">
      <input id="shoeSearch" type="text" placeholder="브랜드 / 모델명 검색" />
      <select id="brandFilter">
        <option value="">전체 브랜드</option>
      </select>
      <select id="priceFilter">
        <option value="">전체 가격</option>
        <option value="low">10만원 이하</option>
        <option value="mid">10~20만원</option>
        <option value="high">20만원 이상</option>
      </select>
      <select id="widthFilter">
        <option value="">발볼 전체</option>
        <option value="normal">보통</option>
        <option value="wide">넓음</option>
      </select>
    </section>

    <div id="shoeList" class="card-grid"></div>
  </main>

  <aside id="compareBox" class="compare-box">
    <h3>비교함</h3>
    <div id="compareItems"></div>
  </aside>

  <script src="script.js"></script>
</body>
</html>
